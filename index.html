<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Manager</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h2 {
    text-align: center;
}

.section {
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 5px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.output-box {
    margin-top: 20px;
    padding: 15px;
    background: black;
    border-radius: 8px;
    min-height: 150px;
    overflow-y: auto;
}

table, th, td {
    border: 1px solid #555;
    padding: 8px;
}

th {
    background: #1e40af;
}
</style>
</head>

<body>

<div class="container">
<h2>Attendance Manager</h2>

<div class="section">
<h3>Add Student</h3>
<input id="reg" placeholder="Registration Number">
<input id="name" placeholder="Student Name">
<button onclick="addStudent()">Add Student</button>
</div>

<div class="section">
<h3>Mark Attendance</h3>
<input id="reg2" placeholder="Reg No">
<input id="date" placeholder="Date (YYYY-MM-DD)">
<input id="status" placeholder="P / A">
<button onclick="markAttendance()">Mark Attendance</button>
</div>

<div class="section">
<h3>View Summary</h3>
<input id="reg3" placeholder="Reg No">
<button onclick="viewSummary()">View Summary</button>
</div>

<div class="section">
<h3>Reports</h3>
<button onclick="showAll()">Show All Students</button>
<button onclick="showAvg()">Class Average</button>
</div>

<div class="output-box" id="output">
System Ready...
</div>

</div>

<!-- 🔥 SAFE WASM CONFIG -->
<script>
var Module = {
    noInitialRun: true,
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "index.wasm";
        return path;
    }
};
</script>

<script src="index.js"></script>

<script>
let mgr;

createModule().then(Module => {
    mgr = new Module.AttendanceManager();
    document.getElementById("output").innerHTML = "✅ WASM Loaded Successfully";
});

// ---------------- ADD STUDENT ----------------
function addStudent() {
    let res = JSON.parse(mgr.addStudent(reg.value, name.value));
    document.getElementById("output").innerHTML = `<p>✅ ${res.msg}</p>`;
}

// ---------------- MARK ATTENDANCE ----------------
function markAttendance() {
    let res = JSON.parse(
        mgr.markAttendance(reg2.value, date.value, status.value)
    );

    document.getElementById("output").innerHTML = `<p>📅 ${res.msg}</p>`;
}

// ---------------- SUMMARY (CARD VIEW) ----------------
function viewSummary() {
    let res = JSON.parse(mgr.getStudentSummary(reg3.value));

    let html = `
        <div style="background:#111;padding:15px;border-radius:10px">
            <h3>📊 Student Summary</h3>
            <p><b>Total Days:</b> ${res.totalDays}</p>
            <p><b>Present:</b> ${res.present}</p>
            <p><b>Absent:</b> ${res.absent}</p>
            <p><b>Attendance:</b> ${res.percentage.toFixed(2)}%</p>
        </div>
    `;

    document.getElementById("output").innerHTML = html;
}

// ---------------- ALL STUDENTS (TABLE VIEW) ----------------
function showAll() {
    let data = JSON.parse(mgr.getAllStudentsJSON());

    let html = `
        <h3>📋 All Students</h3>
        <table style="width:100%; border-collapse: collapse;">
            <tr>
                <th>Reg No</th>
                <th>Name</th>
                <th>Attendance %</th>
                <th>Status</th>
            </tr>
    `;

    data.forEach(s => {
        let color = s.shortage ? "red" : "lightgreen";
        let status = s.shortage ? "Shortage" : "OK";

        html += `
            <tr style="text-align:center;">
                <td>${s.regNo}</td>
                <td>${s.name}</td>
                <td>${s.percentage.toFixed(2)}%</td>
                <td style="color:${color};">${status}</td>
            </tr>
        `;
    });

    html += "</table>";

    document.getElementById("output").innerHTML = html;
}

// ---------------- CLASS AVERAGE ----------------
function showAvg() {
    let avg = mgr.getClassAverage();

    let html = `
        <div style="background:#111;padding:15px;border-radius:10px">
            <h3>📈 Class Average</h3>
            <p style="font-size:20px;color:lightgreen;">
                ${avg.toFixed(2)}%
            </p>
        </div>
    `;

    document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
