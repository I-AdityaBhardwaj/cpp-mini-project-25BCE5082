<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Manager</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 5px;
    width: 95%;
}

button {
    background: #3b82f6;
    border: none;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.output {
    margin-top: 15px;
    padding: 10px;
    background: #0f172a;
    border-radius: 5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Attendance Manager</h2>

<h3>Add Student</h3>
<input id="reg" placeholder="Registration Number">
<input id="name" placeholder="Student Name">
<button onclick="addStudent()">Add Student</button>

<h3>Mark Attendance</h3>
<input id="reg2" placeholder="Reg No">
<input id="date" placeholder="Date (YYYY-MM-DD)">
<input id="status" placeholder="P / A">
<button onclick="markAttendance()">Mark</button>

<h3>View Summary</h3>
<input id="reg3" placeholder="Reg No">
<button onclick="viewSummary()">View</button>

<h3>Reports</h3>
<button onclick="showAll()">Show All</button>
<button onclick="showAvg()">Class Average</button>

<div class="output" id="output"></div>
</div>

<script>
var Module = {
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "index.wasm";
        return path;
    }
};
</script>

<script src="index.js"></script>

<script>
let mgr;

createModule().then(Module => {
    mgr = new Module.AttendanceManager();
}).catch(err => {
    alert("WASM NOT LOADED");
    console.error(err);
});

function addStudent() {
    let res = JSON.parse(mgr.addStudent(reg.value, name.value));
    output.innerText = res.msg;
}

function markAttendance() {
    let res = JSON.parse(
        mgr.markAttendance(reg2.value, date.value, status.value)
    );
    output.innerText = res.msg;
}

function viewSummary() {
    let res = JSON.parse(mgr.getStudentSummary(reg3.value));
    output.innerText = JSON.stringify(res, null, 2);
}

function showAll() {
    let res = JSON.parse(mgr.getAllStudentsJSON());
    output.innerText = JSON.stringify(res, null, 2);
}

function showAvg() {
    output.innerText = "Average: " + mgr.getClassAverage().toFixed(2) + "%";
}
</script>

</body>
</html>
