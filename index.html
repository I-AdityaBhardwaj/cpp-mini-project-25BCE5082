<!DOCTYPE html>
<html>
<head>
    <title>Attendance Manager (Terminal UI)</title>
    <style>
        body {
            background: black;
            color: #00ff00;
            font-family: monospace;
            padding: 20px;
        }

        #output {
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        input {
            background: black;
            color: #00ff00;
            border: none;
            outline: none;
            width: 90%;
            font-family: monospace;
        }
    </style>
</head>
<body>

<h2>Attendance Manager (Terminal)</h2>

<div id="output"></div>
<input type="text" id="input" placeholder="Type command here..." autofocus>

<script>
let students = [];

function print(text) {
    document.getElementById("output").innerHTML += text + "\n";
}

function handleCommand(cmd) {
    let parts = cmd.split(" ");

    switch(parts[0]) {

        case "add":
            if (parts.length < 3) {
                print("Usage: add <regNo> <name>");
                return;
            }
            let reg = parts[1];
            let name = parts[2];

            if (students.find(s => s.reg === reg)) {
                print("Duplicate student!");
                return;
            }

            students.push({reg, name, attendance: []});
            print("Student added.");
            break;

        case "mark":
            if (parts.length < 3) {
                print("Usage: mark <index> <P/A>");
                return;
            }

            let index = parseInt(parts[1]);
            let status = parts[2].toUpperCase();

            if (!students[index]) {
                print("Invalid index!");
                return;
            }

            if (status !== 'P' && status !== 'A') {
                print("Only P or A allowed!");
                return;
            }

            students[index].attendance.push(status);
            print("Attendance marked.");
            break;

        case "view":
            let i = parseInt(parts[1]);

            if (!students[i]) {
                print("Invalid index!");
                return;
            }

            let att = students[i].attendance;
            let p = att.filter(x => x === 'P').length;
            let percent = att.length ? (p * 100 / att.length).toFixed(2) : 0;

            print(`Name: ${students[i].name}`);
            print(`Attendance: ${att.join(" ")}`);
            print(`Percentage: ${percent}%`);
            break;

        case "list":
            students.forEach((s, i) => {
                let p = s.attendance.filter(x => x === 'P').length;
                let percent = s.attendance.length ? (p * 100 / s.attendance.length).toFixed(2) : 0;

                print(`${i}. ${s.name} (${s.reg}) - ${percent}%`);
            });
            break;

        case "shortage":
            students.forEach((s, i) => {
                let p = s.attendance.filter(x => x === 'P').length;
                let percent = s.attendance.length ? (p * 100 / s.attendance.length) : 0;

                if (percent < 75) {
                    print(`${s.name} - ${percent.toFixed(2)}%`);
                }
            });
            break;

        case "avg":
            let total = 0;
            students.forEach(s => {
                let p = s.attendance.filter(x => x === 'P').length;
                let percent = s.attendance.length ? (p * 100 / s.attendance.length) : 0;
                total += percent;
            });

            let avg = students.length ? (total / students.length).toFixed(2) : 0;
            print("Class Average: " + avg + "%");
            break;

        case "help":
            print(`
Commands:
add <regNo> <name>
mark <index> <P/A>
view <index>
list
shortage
avg
help
            `);
            break;

        default:
            print("Unknown command. Type 'help'");
    }
}

document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let cmd = this.value;
        print("> " + cmd);
        handleCommand(cmd);
        this.value = "";
    }
});

// initial help
print("Type 'help' to see commands");
</script>

</body>
</html>
