<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Manager</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h2 {
    text-align: center;
}

.section {
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 5px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

.output-box {
    margin-top: 20px;
    padding: 15px;
    background: black;
    border-radius: 8px;
    min-height: 120px;
    white-space: pre-wrap;
    overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
<h2>Attendance Manager</h2>

<div class="section">
<h3>Add Student</h3>
<input id="reg" placeholder="Registration Number">
<input id="name" placeholder="Student Name">
<button onclick="addStudent()">Add Student</button>
</div>

<div class="section">
<h3>Mark Attendance</h3>
<input id="reg2" placeholder="Reg No">
<input id="date" placeholder="Date (YYYY-MM-DD)">
<input id="status" placeholder="P / A">
<button onclick="markAttendance()">Mark Attendance</button>
</div>

<div class="section">
<h3>View Summary</h3>
<input id="reg3" placeholder="Reg No">
<button onclick="viewSummary()">View Summary</button>
</div>

<div class="section">
<h3>Reports</h3>
<button onclick="showAll()">Show All Students</button>
<button onclick="showAvg()">Class Average</button>
</div>

<div class="output-box" id="output">
System Ready...
</div>

</div>

<!-- 🔥 EXTRA SAFE WASM CONFIG -->
<script>
var Module = {
    noInitialRun: true,
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "index.wasm";
        return path;
    }
};
</script>

<script src="index.js"></script>

<script>
let mgr = null;

createModule().then(Module => {
    mgr = new Module.AttendanceManager();
    log("WASM Loaded Successfully");
}).catch(err => {
    log("❌ WASM NOT LOADED");
    console.error(err);
});

// 🔥 OUTPUT LOGGER
function log(msg) {
    const out = document.getElementById("output");
    out.innerText += "\n" + msg;
    out.scrollTop = out.scrollHeight;
}

// 🔥 FUNCTIONS

function addStudent() {
    if (!mgr) return log("Wait for WASM");

    let reg = document.getElementById("reg").value;
    let name = document.getElementById("name").value;

    if (!reg || !name) return log("⚠ Fill all fields");

    let res = JSON.parse(mgr.addStudent(reg, name));
    log("Add Student → " + res.msg);
}

function markAttendance() {
    let reg = document.getElementById("reg2").value;
    let date = document.getElementById("date").value;
    let status = document.getElementById("status").value;

    let res = JSON.parse(
        mgr.markAttendance(reg, date, status)
    );

    log("Mark Attendance → " + res.msg);
}

function viewSummary() {
    let reg = document.getElementById("reg3").value;

    let res = JSON.parse(mgr.getStudentSummary(reg));
    log("Summary:\n" + JSON.stringify(res, null, 2));
}

function showAll() {
    let res = JSON.parse(mgr.getAllStudentsJSON());
    log("All Students:\n" + JSON.stringify(res, null, 2));
}

function showAvg() {
    let avg = mgr.getClassAverage();
    log("Class Average: " + avg.toFixed(2) + "%");
}
</script>

</body>
</html>
