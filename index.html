<!DOCTYPE html>
<html>
<head>
    <title>Attendance Manager</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }
    </style>
</head>

<body>

<h1>Attendance Manager</h1>

<div class="card">
    <h3>Add Student</h3>
    <input type="text" id="reg" placeholder="Reg No">
    <input type="text" id="name" placeholder="Name">
    <button onclick="addStudent()">Add</button>
</div>

<div class="card">
    <h3>Student List</h3>
    <table id="table">
        <thead>
            <tr>
                <th>Reg No</th>
                <th>Name</th>
                <th>Attendance %</th>
                <th>Mark Present</th>
                <th>Mark Absent</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script src="attendance.js"></script>

<script>
let students = [];

Module.onRuntimeInitialized = function () {
    console.log("WASM Loaded");

    window.addStudent = function () {
        let reg = document.getElementById("reg").value;
        let name = document.getElementById("name").value;

        if (!reg || !name) {
            alert("Fill all fields!");
            return;
        }

        Module.ccall('addStudent', null,
            ['string', 'string'],
            [reg, name]);

        students.push({reg, name});
        renderTable();
    };

    window.mark = function(index, status) {
        Module.ccall('markAttendance', null,
            ['number', 'number'],
            [index, status.charCodeAt(0)]);

        renderTable();
    };

    function renderTable() {
        let tbody = document.querySelector("#table tbody");
        tbody.innerHTML = "";

        students.forEach((s, i) => {
            let percent = Module.ccall('getPercentage', 'number',
                ['number'], [i]);

            let row = `
                <tr>
                    <td>${s.reg}</td>
                    <td>${s.name}</td>
                    <td>${percent.toFixed(2)}%</td>
                    <td><button onclick="mark(${i}, 'P')">P</button></td>
                    <td><button onclick="mark(${i}, 'A')">A</button></td>
                </tr>
            `;

            tbody.innerHTML += row;
        });
    }
};
</script>

</body>
</html>
