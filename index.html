<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Attendance Manager</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 12px;
}

h2 { text-align: center; }

.section { margin-bottom: 20px; }

input, button {
    padding: 10px;
    margin: 5px 0;
    width: 100%;
    border-radius: 5px;
    border: none;
}

button {
    background: #3b82f6;
    color: white;
    cursor: pointer;
}

button:hover { background: #2563eb; }

.output-box {
    margin-top: 20px;
    padding: 15px;
    background: black;
    border-radius: 8px;
    min-height: 150px;
}

table, th, td {
    border: 1px solid #555;
    padding: 8px;
}

th { background: #1e40af; }
</style>
</head>

<body>

<div class="container">
<h2>Attendance Manager</h2>

<div class="section">
<h3>Add Student</h3>
<input id="reg" placeholder="Registration Number">
<input id="name" placeholder="Student Name">
<button onclick="addStudent()">Add Student</button>
</div>

<div class="section">
<h3>Mark Attendance</h3>
<input id="reg2" placeholder="Reg No">
<input id="date" placeholder="DD/MM/YYYY">
<input id="status" placeholder="P / A">
<button onclick="markAttendance()">Mark Attendance</button>
</div>

<div class="section">
<h3>View Summary</h3>
<input id="reg3" placeholder="Reg No">
<button onclick="viewSummary()">View Summary</button>
</div>

<div class="section">
<h3>Reports</h3>
<button onclick="showAll()">Show All Students</button>
<button onclick="showAvg()">Class Average</button>
</div>

<div class="output-box" id="output">
<h3>👋 Welcome to Attendance Manager</h3>
<p>Use the form above to add students, mark attendance, and view reports.</p>
</div>

</div>

<!-- SAFE WASM CONFIG -->
<script>
var Module = {
    noInitialRun: true,
    locateFile: function(path) {
        if (path.endsWith(".wasm")) return "index.wasm";
        return path;
    }
};
</script>

<script src="index.js"></script>

<script>
let mgr = null;

// WAIT FOR WASM
createModule().then(Module => {
    mgr = new Module.AttendanceManager();
});

// OUTPUT FUNCTION
function setOutput(html) {
    document.getElementById("output").innerHTML = html;
}

// DATE CONVERSION
function convertDate(dateStr) {
    let parts = dateStr.split("/");
    if (parts.length !== 3) return null;
    return `${parts[2]}-${parts[1]}-${parts[0]}`;
}

// ---------------- ADD ----------------
function addStudent() {
    if (!mgr) return setOutput("⏳ Loading...");

    let reg = document.getElementById("reg").value;
    let name = document.getElementById("name").value;

    if (!reg || !name) {
        return setOutput("❌ Please fill all fields");
    }

    let res = JSON.parse(mgr.addStudent(reg, name));

    setOutput(`
        <h3>✔ Student Added</h3>
        <p>${res.msg}</p>
    `);
}

// ---------------- MARK ----------------
function markAttendance() {
    if (!mgr) return setOutput("⏳ Loading...");

    let reg = document.getElementById("reg2").value;
    let date = document.getElementById("date").value;
    let status = document.getElementById("status").value;

    let converted = convertDate(date);
    if (!converted) {
        return setOutput("❌ Invalid date format (DD/MM/YYYY)");
    }

    let res = JSON.parse(
        mgr.markAttendance(reg, converted, status)
    );

    setOutput(`
        <h3>📅 Attendance Updated</h3>
        <p>${res.msg}</p>
    `);
}

// ---------------- SUMMARY ----------------
function viewSummary() {
    if (!mgr) return setOutput("⏳ Loading...");

    let reg = document.getElementById("reg3").value;

    let res = JSON.parse(mgr.getStudentSummary(reg));

    setOutput(`
        <h3>📊 Student Summary</h3>
        <p>Total Days: <b>${res.totalDays}</b></p>
        <p>Present: <b>${res.present}</b></p>
        <p>Absent: <b>${res.absent}</b></p>
        <p>Attendance: <b>${res.percentage.toFixed(2)}%</b></p>
    `);
}

// ---------------- TABLE ----------------
function showAll() {
    if (!mgr) return setOutput("⏳ Loading...");

    let data = JSON.parse(mgr.getAllStudentsJSON());

    let html = `
        <h3>📋 Students List</h3>
        <table width="100%">
        <tr>
            <th>Reg No</th>
            <th>Name</th>
            <th>Attendance %</th>
            <th>Status</th>
        </tr>
    `;

    data.forEach(s => {
        let status = s.shortage ? "❌ Shortage" : "✔ OK";
        let color = s.shortage ? "red" : "lightgreen";

        html += `
            <tr>
                <td>${s.regNo}</td>
                <td>${s.name}</td>
                <td>${s.percentage.toFixed(2)}%</td>
                <td style="color:${color}">${status}</td>
            </tr>
        `;
    });

    html += "</table>";

    setOutput(html);
}

// ---------------- AVG ----------------
function showAvg() {
    if (!mgr) return setOutput("⏳ Loading...");

    let avg = mgr.getClassAverage();

    setOutput(`
        <h3>📈 Class Average</h3>
        <p style="font-size:20px;color:lightgreen;">
            ${avg.toFixed(2)}%
        </p>
    `);
}
</script>

</body>
</html>
